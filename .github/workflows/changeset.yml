name: Create Changeset files

on:
  pull_request:
    branches: [dev]
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      type:
        description: |
          The SemVer type <major|minor|patch> to use manually by
          overriding the label type
        required: true
        default: "patch"
      name:
        description: |
          The package name to use when running manually. If not specified, it will
          be determined by looking at the closest package.json to the first changed
          file.
        required: false
      summary:
        description: The changeset summary to use when running manually.
        required: false

jobs:
  changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout in the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install

      - name: Determine Label Type
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "LABEL_TYPE=${{ github.event.inputs.type }}" >> $GITHUB_ENV
            echo "SUMMARY=${{ github.event.inputs.summary }}" >> $GITHUB_ENV
          else
            # Extracts first matching semver label from the PR event context
            LABEL=$(jq --raw-output '.pull_request.labels[].name | select(. == "major" or . == "minor" or . == "patch")' "$GITHUB_EVENT_PATH" | head -n 1)
            # Fallback to patch if no matching label is found yet
            if [ -z "$LABEL" ]; then LABEL="patch"; fi
            echo "LABEL_TYPE=$LABEL" >> $GITHUB_ENV
            echo "SUMMARY=${{ github.event.pull_request.title }}" >> $GITHUB_ENV
          fi

      - name: Generate Native Changeset File
        run: |
          mkdir -p .changeset
          FILENAME=".changeset/automation-$(date +%s).md"

          echo "---" > $FILENAME

          # Find unique package subdirectories that have modified files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_PKGS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^packages/' | cut -d'/' -f2 | sort -u)
          else
            CHANGED_PKGS=$(git diff --name-only HEAD~1...HEAD | grep '^packages/' | cut -d'/' -f2 | sort -u)
          fi

          if [ -z "$CHANGED_PKGS" ]; then
            # Fallback to core CLI if files were changed globally outside of packages folder
            echo '"@thanka-digital/beej-cli": "${{ env.LABEL_TYPE }}"' >> $FILENAME
          else
            for pkg in $CHANGED_PKGS; do
              if [ -f "packages/$pkg/package.json" ]; then
                # Read true scoped package name natively using jq
                PKG_NAME=$(jq -r '.name' "packages/$pkg/package.json")
                if [ ! -z "$PKG_NAME" ] && [ "$PKG_NAME" != "null" ]; then
                  echo "\"$PKG_NAME\": \"${{ env.LABEL_TYPE }}\"" >> $FILENAME
                fi
              fi
            done
          fi

          echo "---" >> $FILENAME
          echo "" >> $FILENAME
          echo "${{ env.SUMMARY }}" >> $FILENAME

          echo "✅ Flawlessly generated changeset file:"
          cat $FILENAME

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate changeset version metadata [skip ci]"
          file_pattern: ".changeset/*.md"
